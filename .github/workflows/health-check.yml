name: Health Check

on:
  push:
    branches: [main]
  schedule:
    # Daily midnight UTC — belt-and-suspenders (primary: UptimeRobot + Services supervisor)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check demo site /health endpoint
        run: |
          STATUS=$(curl -f -s -o /dev/null -w "%{http_code}" \
            "${DEMO_URL}/health" || echo "FAIL")
          if [[ "${STATUS}" != "200" ]]; then
            echo "Health check failed! HTTP status: ${STATUS}"
            exit 1
          fi
          echo "Health check passed (HTTP ${STATUS})"
        env:
          DEMO_URL: ${{ vars.DEMO_URL || 'https://blackbull.alwaysdata.net' }}
