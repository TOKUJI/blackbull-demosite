name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys — if a new push arrives while a deploy is
# in progress, cancel the older one.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Job 1 — Run tests
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

  # ------------------------------------------------------------------
  # Job 2 — Deploy to Alwaysdata (requires test success)
  # ------------------------------------------------------------------
  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: success()
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALWAYSDATA_HOST }}
          username: ${{ secrets.ALWAYSDATA_USER }}
          key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/blackbull-demo

            echo "=== Git status ==="
            git status --short

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Cleaning all stale bytecode (pre-install) ==="
            find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
            find . -name '*.pyc' -delete 2>/dev/null || true

            echo "=== Force-reinstalling dependencies ==="
            .venv/bin/pip install --force-reinstall --no-deps -e .
            .venv/bin/pip install --upgrade blackbull blackbull-htcpcp

            echo "=== Cleaning stale bytecode (post-install) ==="
            find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
            find . -name '*.pyc' -delete 2>/dev/null || true

            echo "=== Verifying imports ==="
            .venv/bin/python -c '
            import blackbull; print(f"blackbull {blackbull.__version__}")
            import blackbull_htcpcp; print(f"blackbull-htcpcp {blackbull_htcpcp.__version__}")
            from blackbull_htcpcp import HtcpcpMethod; print(f"HtcpcpMethod: {list(HtcpcpMethod)}")
            print("All imports OK")
            '

            echo "=== Restarting service via Alwaysdata API ==="
            # Alwaysdata official method: POST /v1/service/{id}/restart/
            # Services run on separate servers from SSH — pkill/pgrep CANNOT
            # see the service process. The API sends SIGHUP to the supervisor.
            # Auth: HTTP Basic. Raw token as username, empty password.
            # Bearer is NOT supported ("Only basic Authorization is supported").
            # Ref: https://api.alwaysdata.com/v1/service/doc/
            RESTART_RESPONSE=$(curl -fsS -X POST \
              --basic --user "${{ secrets.ALWAYSDATA_API_KEY }}:" \
              "https://api.alwaysdata.com/v1/service/26686/restart/")
            echo "API response: ${RESTART_RESPONSE}"
            echo "=== Deploy complete ==="

  # ------------------------------------------------------------------
  # Job 3 — Health check (requires deploy success)
  # ------------------------------------------------------------------
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: success()
    steps:
      - name: Wait for restart
        run: sleep 5

      - name: Health check with retries
        run: |
          DEMO_URL="${{ vars.DEMO_URL || 'https://blackbull.alwaysdata.net' }}"
          echo "Target: ${DEMO_URL}/health"

          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -f -s -o /dev/null -w "%{http_code}" \
              "${DEMO_URL}/health" 2>&1 || echo "FAIL")

            if [[ "${HTTP_STATUS}" == "200" ]]; then
              echo "✅ Health check passed (HTTP ${HTTP_STATUS}) after ${i} attempt(s)"
              exit 0
            fi

            echo "Attempt ${i}/12: HTTP ${HTTP_STATUS} — retrying in 5s..."
            sleep 5
          done

          echo "❌ Health check FAILED after 12 attempts (60s timeout)"
          exit 1
